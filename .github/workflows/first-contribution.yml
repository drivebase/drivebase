name: First Contribution

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  label-first-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Label first-time contributor issues and PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isPullRequest = context.eventName === 'pull_request';
            const issueNumber = isPullRequest
              ? context.payload.pull_request.number
              : context.payload.issue.number;
            const author = isPullRequest
              ? context.payload.pull_request.user.login
              : context.payload.issue.user.login;
            const labelName = 'first contribution';

            const typeQualifier = isPullRequest ? 'is:pr' : 'is:issue';
            const searchQuery = `repo:${owner}/${repo} ${typeQualifier} author:${author}`;
            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
              q: searchQuery,
              per_page: 2,
            });

            if (searchResult.total_count !== 1) {
              const itemType = isPullRequest ? 'PR' : 'issue';
              core.info(`Skipping label. ${author} has ${searchResult.total_count} ${itemType}(s) in this repo.`);
              return;
            }

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: '0e8a16',
                  description: 'First issue or pull request opened by this contributor',
                });
              } else {
                throw error;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [labelName],
            });