name: Build & Push Docker images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build the web SPA once and share it as an artifact ───────────────────
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_PUBLIC_API_URL: ""
        run: bun run --cwd apps/web build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

  # ── 2. Build platform-specific Docker images ─────────────────────────────────
  build:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Build and push platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime-ci
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-${{ matrix.suffix }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
          provenance: false
          outputs: type=image,compression=zstd

  # ── 3. Merge platform images into a single multi-arch manifest ───────────────
  merge-and-push:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_RELEASE=true
          else
            VERSION="${GITHUB_SHA::7}"
            IS_RELEASE=false
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"

          docker buildx imagetools create -t $REGISTRY/$IMAGE_NAME:$VERSION \
            $REGISTRY/$IMAGE_NAME:$VERSION-amd64 \
            $REGISTRY/$IMAGE_NAME:$VERSION-arm64

          if [[ "${{ steps.version.outputs.IS_RELEASE }}" == "true" ]]; then
            docker buildx imagetools create -t $REGISTRY/$IMAGE_NAME:latest \
              $REGISTRY/$IMAGE_NAME:$VERSION-amd64 \
              $REGISTRY/$IMAGE_NAME:$VERSION-arm64
          fi

      - name: Clean up platform tags
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE_NAME="${{ env.IMAGE_NAME }}"
          docker buildx imagetools rm $REGISTRY/$IMAGE_NAME:$VERSION-amd64 || true
          docker buildx imagetools rm $REGISTRY/$IMAGE_NAME:$VERSION-arm64 || true

  # ── 4. Create GitHub release with notes from CHANGELOG.md ────────────────────
  release:
    needs: merge-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NORMALIZED_VERSION="${VERSION#v}"
          CHANGELOG_CONTENT="$(
            awk -v version="$VERSION" -v normalized_version="$NORMALIZED_VERSION" '
              BEGIN { in_section = 0 }
              /^##? / {
                if (in_section) { exit }
                if ($0 ~ "^##? \\[" version "\\]" || $0 ~ "^##? \\[" normalized_version "\\]") {
                  in_section = 1
                  next
                }
              }
              in_section { print }
            ' CHANGELOG.md
          )"

          if [[ -z "${CHANGELOG_CONTENT//[[:space:]]/}" ]]; then
            CHANGELOG_CONTENT="No changelog entries were found for ${VERSION}."
          fi

          {
            echo "BODY<<EOF"
            echo "$CHANGELOG_CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.version.outputs.VERSION }}
          RELEASE_BODY: ${{ steps.changelog.outputs.BODY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;
            const body = process.env.RELEASE_BODY || "";

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner, repo,
                release_id: release.data.id,
                tag_name: tag,
                name: tag,
                body,
                draft: false,
                prerelease: tag.includes("-"),
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: tag,
                body,
                draft: false,
                prerelease: tag.includes("-"),
              });
            }

  # ── 5. Build and push the updater image ──────────────────────────────────────
  build-updater:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_RELEASE=true
          else
            VERSION="${GITHUB_SHA::7}"
            IS_RELEASE=false
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push updater image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/updater
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/drivebase/updater:${{ steps.version.outputs.VERSION }}
            ${{ steps.version.outputs.IS_RELEASE == 'true' && format('{0}/drivebase/updater:latest', env.REGISTRY) || '' }}
          cache-from: type=gha,scope=updater
          cache-to: type=gha,mode=max,scope=updater
          provenance: false
