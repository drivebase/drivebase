[global]
        server string = samba
        idmap config * : range = 3000-7999
        security = user
        server min protocol = SMB2
        ntlm auth = yes
        aio read size = 0
        aio write size = 0

        # disable printing services
        load printers = no
        printing = bsd
        printcap name = /dev/null
        disable spoolss = yes

[Data]
        path = /storage
        comment = Shared
        valid users = @smb
        browseable = yes
        writable = yes
        read only = no
        force user = samba
        force group = smb
