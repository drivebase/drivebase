"""
API key for programmatic access
"""
type ApiKey {
	id: ID!
	name: String!
	description: String
	keyPrefix: String!
	scopes: [String!]!
	"""
	Per-provider access restrictions. If null/empty, key has access to all providers.
	"""
	providerScopes: [ApiKeyProviderScope!]
	expiresAt: DateTime
	lastUsedAt: DateTime
	isActive: Boolean!
	createdAt: DateTime!
	updatedAt: DateTime!
}

"""
Provider-level access scope for an API key
"""
type ApiKeyProviderScope {
	providerId: ID!
	basePath: String!
}

"""
Result of createApiKey — fullKey is shown exactly once
"""
type CreateApiKeyResult {
	apiKey: ApiKey!
	fullKey: String!
}

input ApiKeyProviderScopeInput {
	providerId: ID!
	basePath: String
}

input CreateApiKeyInput {
	name: String!
	description: String
	scopes: [String!]!
	providerScopes: [ApiKeyProviderScopeInput!]
	expiresAt: DateTime
}

input UpdateApiKeyInput {
	name: String
	description: String
}

extend type Query {
	apiKeys: [ApiKey!]!
	apiKey(id: ID!): ApiKey!
}

extend type Mutation {
	createApiKey(input: CreateApiKeyInput!): CreateApiKeyResult!
	updateApiKey(id: ID!, input: UpdateApiKeyInput!): ApiKey!
	revokeApiKey(id: ID!): Boolean!
}
