"""
Activity logging
"""
type Activity {
	id: ID!
	kind: String!
	title: String!
	summary: String
	status: String
	progress: Float
	details: JSON
	userId: ID!
	workspaceId: ID
	occurredAt: DateTime!
	createdAt: DateTime!

	"""
	User who performed the activity
	"""
	user: User!
}

"""
Paginated list of activity log entries.
"""
type ActivityConnection {
	nodes: [Activity!]!
	meta: PaginationMeta!
}

extend type Query {
	"""
	Get activity log (recent activities)
	"""
	activities(page: Int, limit: Int): ActivityConnection! @auth

	"""
	Get active jobs (pending or running) for the current workspace
	"""
	activeJobs: [Job!]! @auth

	"""
	Get recent jobs (active and completed) for the current workspace
	"""
	recentJobs(limit: Int, offset: Int): [Job!]! @auth
}

extend type Mutation {
	"""
	Cancel a queued or running job. Supports any cancellable job type
	(e.g. provider_transfer, smart-search-indexing).
	"""
	cancelJob(jobId: ID!): Boolean! @auth

	"""
	Resolve a paused job by providing a user resolution (e.g. overwrite or skip).
	"""
	resolveJobPause(jobId: ID!, resolution: JSON!): Job! @auth

	"""
	Delete activities by ID for the current user
	"""
	clearActivities(ids: [ID!]!): Int! @auth
}

"""
Job status for trackable long-running operations
"""
enum JobStatus {
	PENDING
	RUNNING
	PAUSED
	COMPLETED
	ERROR
}

"""
A trackable job representing a long-running operation (sync, upload, etc.)
"""
type Job {
	id: ID!
	type: String!
	title: String!
	message: String
	progress: Float!
	status: JobStatus!
	metadata: JSON
	createdAt: DateTime!
	updatedAt: DateTime!
}

type Subscription {
	"""
	Subscribe to job updates for the current workspace
	"""
	jobUpdated: Job! @auth

	"""
	Subscribe to newly created activities for the current user
	"""
	activityCreated: Activity! @auth
}
