"""
E2EE Vault — private encrypted file storage per user.
The server stores only encrypted key material; plaintext never leaves the client.
"""
type Vault {
	id: ID!
	userId: ID!
	publicKey: String!
	encryptedPrivateKey: String!
	kekSalt: String!
	createdAt: DateTime!
	updatedAt: DateTime!
}

type VaultUploadResponse {
	fileId: ID!
	uploadUrl: String
	uploadFields: JSON
	useDirectUpload: Boolean!
}

type VaultDownloadResponse {
	fileId: ID!
	downloadUrl: String
	useDirectDownload: Boolean!
	encryptedFileKey: String!
}

extend type Query {
	"""
	Get the current user's vault (null if not set up yet)
	"""
	myVault: Vault @auth

	"""
	Get files and folders inside the vault at a given location
	"""
	vaultContents(folderId: ID): PathContents! @auth
}

extend type Mutation {
	"""
	Create the vault with client-generated key material
	"""
	setupVault(input: SetupVaultInput!): Vault! @auth

	"""
	Re-encrypt private key with a new passphrase-derived KEK
	"""
	changeVaultPassphrase(input: ChangeVaultPassphraseInput!): Vault! @auth

	"""
	Request an upload slot for an encrypted file inside the vault
	"""
	requestVaultUpload(input: RequestVaultUploadInput!): VaultUploadResponse!
		@auth

	"""
	Get a download URL plus the encrypted file key for decryption
	"""
	requestVaultDownload(id: ID!): VaultDownloadResponse! @auth

	"""
	Create a folder inside the vault
	"""
	createVaultFolder(name: String!, providerId: ID!, parentId: ID): Folder! @auth

	"""
	Delete a vault file (soft delete)
	"""
	deleteVaultFile(id: ID!): Boolean! @auth

	"""
	Rename a vault file
	"""
	renameVaultFile(id: ID!, name: String!): File! @auth

	"""
	Star a vault file
	"""
	starVaultFile(id: ID!): File! @auth

	"""
	Unstar a vault file
	"""
	unstarVaultFile(id: ID!): File! @auth

	"""
	Initiate a chunked upload for a large encrypted file
	"""
	initiateVaultChunkedUpload(
		input: InitiateVaultChunkedUploadInput!
	): ChunkedUploadSession! @auth
}

input SetupVaultInput {
	publicKey: String!
	encryptedPrivateKey: String!
	kekSalt: String!
}

input ChangeVaultPassphraseInput {
	encryptedPrivateKey: String!
	kekSalt: String!
}

input RequestVaultUploadInput {
	name: String!
	mimeType: String!
	size: Float!
	folderId: ID
	providerId: ID!
	encryptedFileKey: String!
}

input InitiateVaultChunkedUploadInput {
	name: String!
	mimeType: String!
	totalSize: Float!
	chunkSize: Float
	folderId: ID
	providerId: ID!
	encryptedFileKey: String!
	encryptedChunkSize: Int
}
