"""
User management
"""
enum UserRole {
	VIEWER
	EDITOR
	ADMIN
	OWNER
}

type User {
	id: ID!
	name: String!
	email: String!
	role: UserRole!
	isActive: Boolean!
	onboardingCompleted: Boolean!
	lastLoginAt: DateTime
	createdAt: DateTime!
	updatedAt: DateTime!
}

type UserSearchResult {
	id: ID!
	name: String!
	email: String!
}

extend type Query {
	"""
	Get all users (admin/owner only)
	"""
	users(limit: Int, offset: Int): [User!]! @auth(role: [ADMIN, OWNER])

	"""
	Get user by ID (admin/owner only)
	"""
	user(id: ID!): User @auth(role: [ADMIN, OWNER])

	"""
	Search users by name or email prefix (for adding workspace members)
	"""
	searchUsers(query: String!, limit: Int): [UserSearchResult!]! @auth
}

extend type Mutation {
	"""
	Create a new user (admin/owner only)
	"""
	createUser(input: CreateUserInput!): User! @auth(role: [ADMIN, OWNER])

	"""
	Update user role or status (admin/owner only)
	"""
	updateUser(id: ID!, input: UpdateUserInput!): User! @auth(role: [ADMIN, OWNER])

	"""
	Delete user (owner only)
	"""
	deleteUser(id: ID!): Boolean! @auth(role: [OWNER])
}

input CreateUserInput {
	email: String!
	password: String!
	role: UserRole!
}

input UpdateUserInput {
	role: UserRole
	isActive: Boolean
}
