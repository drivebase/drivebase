"""
Workspace management
"""
enum WorkspaceColor {
	ROSE
	PEACH
	AMBER
	MINT
	SKY
}

enum WorkspaceMemberRole {
	OWNER
	ADMIN
	EDITOR
	VIEWER
}

enum WorkspaceAutoSyncScope {
	ALL
	SELECTED
}

type Workspace {
	id: ID!
	name: String!
	color: WorkspaceColor!
	ownerId: ID!
	syncOperationsToProvider: Boolean!
	autoSyncEnabled: Boolean!
	autoSyncCron: String
	autoSyncScope: WorkspaceAutoSyncScope!
	autoSyncProviderIds: [ID!]!
	smartSearchEnabled: Boolean!
	createdAt: DateTime!
	updatedAt: DateTime!
}

type MemberAccessGrant {
	providerId: ID!
	folderId: ID
}

type WorkspaceMember {
	userId: ID!
	name: String!
	email: String!
	role: WorkspaceMemberRole!
	joinedAt: DateTime!
	isOwner: Boolean!
	accessGrants: [MemberAccessGrant!]!
}

type WorkspaceInvite {
	id: ID!
	token: String!
	role: WorkspaceMemberRole!
	accessGrants: [MemberAccessGrant!]!
	expiresAt: DateTime!
	createdAt: DateTime!
}

type WorkspaceStatsBucket {
	bucketStart: DateTime!
	uploadedBytes: Float!
	downloadedBytes: Float!
	bandwidthBytes: Float!
}

type WorkspaceStats {
	workspaceId: ID!
	days: Int!
	totalFiles: Float!
	totalSizeBytes: Float!
	totalProviders: Float!
	uploadedBytes: Float!
	downloadedBytes: Float!
	bandwidthBytes: Float!
	buckets: [WorkspaceStatsBucket!]!
}

extend type Query {
	"""
	Get current user's workspaces
	"""
	workspaces: [Workspace!]!

	"""
	List members for a workspace
	"""
	workspaceMembers(workspaceId: ID!): [WorkspaceMember!]!

	"""
	List active invites for a workspace
	"""
	workspaceInvites(workspaceId: ID!): [WorkspaceInvite!]!

	"""
	Get workspace storage and bandwidth stats
	"""
	workspaceStats(workspaceId: ID!, days: Int = 30): WorkspaceStats!
}

input CreateWorkspaceInput {
	name: String!
	color: WorkspaceColor!
}

input AccessGrantInput {
	providerId: ID!
	folderId: ID
}

input CreateWorkspaceInviteInput {
	workspaceId: ID!
	role: WorkspaceMemberRole!
	expiresInDays: Int = 7
	accessGrants: [AccessGrantInput!]
}

input UpdateWorkspaceMemberRoleInput {
	workspaceId: ID!
	userId: ID!
	role: WorkspaceMemberRole!
}

input UpdateWorkspaceNameInput {
	workspaceId: ID!
	name: String!
}

input UpdateWorkspaceSyncOperationsInput {
	workspaceId: ID!
	enabled: Boolean!
}

input UpdateWorkspaceSmartSearchInput {
	workspaceId: ID!
	enabled: Boolean!
}

input UpdateWorkspaceAutoSyncInput {
	workspaceId: ID!
	enabled: Boolean!
	cron: String
	scope: WorkspaceAutoSyncScope!
	providerIds: [ID!]
}

extend type Mutation {
	"""
	Create a new workspace
	"""
	createWorkspace(input: CreateWorkspaceInput!): Workspace!

	"""
	Create workspace invite link with role
	"""
	createWorkspaceInvite(input: CreateWorkspaceInviteInput!): WorkspaceInvite!

	"""
	Accept workspace invite link
	"""
	acceptWorkspaceInvite(token: String!): Workspace!

	"""
	Update workspace member role
	"""
	updateWorkspaceMemberRole(input: UpdateWorkspaceMemberRoleInput!): Boolean!

	"""
	Update workspace name
	"""
	updateWorkspaceName(input: UpdateWorkspaceNameInput!): Workspace!

	"""
	Update workspace sync behavior for move/rename operations
	"""
	updateWorkspaceSyncOperations(
		input: UpdateWorkspaceSyncOperationsInput!
	): Workspace!

	"""
	Remove a member from workspace
	"""
	removeWorkspaceMember(workspaceId: ID!, userId: ID!): Boolean!

	"""
	Revoke a workspace invite link
	"""
	revokeWorkspaceInvite(workspaceId: ID!, inviteId: ID!): Boolean!

	"""
	Toggle smart search for workspace (indexes file contents on first enable)
	"""
	updateWorkspaceSmartSearch(
		input: UpdateWorkspaceSmartSearchInput!
	): Workspace!

	"""
	Update scheduled auto-sync for workspace providers
	"""
	updateWorkspaceAutoSync(input: UpdateWorkspaceAutoSyncInput!): Workspace!

	"""
	Set (replace) access grants for a workspace member.
	Pass an empty array to restore full workspace access.
	"""
	setMemberAccessGrants(
		workspaceId: ID!
		userId: ID!
		grants: [AccessGrantInput!]!
	): Boolean!
}
