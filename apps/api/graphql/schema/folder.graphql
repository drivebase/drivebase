"""
Folder management — folders are provider-backed
"""
type Folder {
	id: ID!
	virtualPath: String!
	name: String!
	remoteId: String!
	providerId: ID!
	workspaceId: ID!
	parentId: ID
	createdBy: ID!
	isDeleted: Boolean!
	starred: Boolean!
	createdAt: DateTime!
	updatedAt: DateTime!

	"""
	Storage provider that owns this folder
	"""
	provider: StorageProvider!

	"""
	Parent folder (if any)
	"""
	parent: Folder

	"""
	Child folders
	"""
	children: [Folder!]!

	"""
	Files in this folder
	"""
	files: [File!]!

	"""
	Permissions for this folder
	"""
	permissions: [Permission!]!
}

extend type Query {
	"""
	Get folder by ID
	"""
	folder(id: ID!): Folder @auth

	"""
	Get folders by parent
	"""
	folders(parentId: ID, providerIds: [ID!]): [Folder!]! @auth

	"""
	Get starred folders
	"""
	starredFolders: [Folder!]! @auth
}

extend type Mutation {
	"""
	Create a new folder on a storage provider
	"""
	createFolder(input: CreateFolderInput!): Folder! @auth

	"""
	Rename a folder
	"""
	renameFolder(id: ID!, name: String!): Folder! @auth

	"""
	Move folder to different parent
	"""
	moveFolder(id: ID!, parentId: ID): Folder! @auth

	"""
	Delete folder (soft delete)
	"""
	deleteFolder(id: ID!): Boolean! @auth

	"""
	Star a folder
	"""
	starFolder(id: ID!): Folder! @auth

	"""
	Unstar a folder
	"""
	unstarFolder(id: ID!): Folder! @auth
}

input CreateFolderInput {
	name: String!
	parentId: ID
	providerId: ID!
}
