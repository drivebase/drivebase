"""
Authentication & authorization directive.

- No arguments: requires authentication only
- role: requires one of the listed global user roles
- workspaceRole: requires one of the listed workspace-level roles
  (workspaceId is extracted from the field's `workspaceId` argument
   or from the `input.workspaceId` argument, or the `x-workspace-id` header)
"""
directive @auth(
	role: [UserRole!]
	workspaceRole: [WorkspaceMemberRole!]
) on FIELD_DEFINITION
